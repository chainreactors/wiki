site_name: ChainReactor Wiki
site_description: chainreactors wiki
site_author: M09ic
site_url: https://wiki.chainreactors.red/
repo_url: https://github.com/chainreactors/
copyright: Copyright &copy; 2025 ChainReactors

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chainreactors
  analytics:
    provider: google
    property: G-DCRVR86FG2
theme:
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - toc.follo
    - navigation.top
    - header.autohide
    - search.share
    - search.suggest
    - search.highlight

  name: material
plugins:
  - search
  - blog:
      blog_toc: true
#   - print-site:
#       exclude:
#         - blog/*
#         - gogo/*
#         - spray/*
#         - rem/*
#         - zombie/*
#         - libs/*
#         - mapping/*
#         - IoM/roadmap.md
#         - index.md
#       print_page_title: "IoM Wiki"
#       print_page_basename: IoM_wiki
#       add_table_of_contents: true
#       add_print_site_banner: true
#       add_to_navigation: true
#       enabled: true
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: true
      slugify: !!python/name:markdown.extensions.toc.slugify_unicode
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

